<!--
  Letter Page Component for Framer
  Fetches the bilingual father-daughter letter from API.
  Detects language from URL: /letter → English, /letter/zh → Chinese
  Embed this in Framer HTML Embed on the /letter page.
-->
<div id="letter-page"></div>
<style>
  #letter-page { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 680px; margin: 0 auto; line-height: 1.8; }
  .lp-lang-note { font-size: 0.85rem; color: #888; margin-bottom: 2rem; }
  .lp-lang-note a { color: #4a9a9a; text-decoration: underline; }
  .lp-body { font-size: 1.05rem; color: #333; }
  .lp-body h2 { font-size: 1.5rem; color: #1a1a1a; margin-top: 2.5rem; margin-bottom: 1rem; }
  .lp-body h3 { font-size: 1.2rem; color: #444; }
  .lp-body blockquote { border-left: 3px solid #4a9a9a; margin: 1.5rem 0; padding: 0.75rem 1.25rem; color: #555; background: #fafafa; font-style: italic; }
  .lp-body strong { color: #1a1a1a; }
  .lp-body em { color: #555; }
  .lp-body hr { border: none; border-top: 1px solid #e5e5e5; margin: 2.5rem 0; }
  .lp-body a { color: #4a9a9a; }
  .lp-body p { margin: 0 0 1rem; }
  .lp-context { background: #f8fafa; border: 1px solid #e0eded; border-radius: 8px; padding: 1.25rem 1.5rem; margin-bottom: 2.5rem; font-size: 0.92rem; color: #555; line-height: 1.7; }
  .lp-loading { color: #aaa; padding: 3rem 0; text-align: center; }
  .lp-footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #e5e5e5; font-size: 0.88rem; color: #888; }
  .lp-footer a { color: #4a9a9a; text-decoration: underline; }
  @media (prefers-color-scheme: dark) {
    .lp-body { color: #ccc; }
    .lp-body h2, .lp-body strong { color: #e8e8e8; }
    .lp-body blockquote { background: #1a1a1a; color: #aaa; }
    .lp-context { background: #111a1a; border-color: #1a3333; color: #aaa; }
    .lp-body hr { border-color: #333; }
    .lp-footer { border-color: #333; }
  }
</style>
<script>
(function() {
  const API = 'https://api.5thdim.ai/api/content';
  const container = document.getElementById('letter-page');
  container.innerHTML = '<div class="lp-loading">Loading...</div>';

  // Detect language from URL path
  const isZh = window.location.pathname.includes('/zh');
  const slug = isZh ? 'letter-zh' : 'letter';

  fetch(API + '/letter/' + slug)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(post => {
      // Simple markdown → HTML
      let html = post.body
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
        .replace(/^---$/gm, '<hr>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/^/, '<p>').replace(/$/, '</p>')
        .replace(/<p><(h[1-3]|ul|ol|hr|blockquote)/g, '<$1')
        .replace(/<\/(h[1-3]|ul|ol|blockquote)><\/p>/g, '</$1>')
        .replace(/<p><\/p>/g, '');

      const langSwitch = isZh
        ? '<div class="lp-lang-note"><em>这是原稿。</em> <a href="/letter">English translation &rarr;</a></div>'
        : '<div class="lp-lang-note"><em>This is the English translation.</em> <a href="/letter/zh">Read the original Chinese &rarr;</a></div>';

      container.innerHTML = `
        ${langSwitch}
        <div class="lp-body">${html}</div>
      `;

      document.title = post.title + ' — 5thdim.ai';
    })
    .catch(() => {
      container.innerHTML = '<div class="lp-loading">Letter not found.</div>';
    });
})();
</script>
