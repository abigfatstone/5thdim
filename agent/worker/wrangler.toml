name = "5thdim-agent"
main = "src/index.js"
compatibility_date = "2024-09-23"
routes = [
  { pattern = "api.5thdim.ai/*", zone_name = "5thdim.ai" }
]

[vars]
ALLOWED_ORIGINS = "https://5thdim.ai,https://www.5thdim.ai,http://localhost:3000"
MAX_TURNS = 6
LLM_MODEL = "anthropic/claude-sonnet-4"

# Set these as secrets: wrangler secret put OPENROUTER_API_KEY

[[d1_databases]]
binding = "DB"
database_name = "5thdim-content"
database_id = "584271e1-63b0-47ca-85f3-b8f6f7a1f49a"
